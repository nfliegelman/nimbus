name: nimbus
on:
  schedule:
    - cron: '0 12 * * *'   # ~7:00 AM Dallas (CDT) - morning bets
    - cron: '0 2 * * *'    # ~9:00 PM Dallas (CDT) - evening results
  workflow_dispatch: {}     # lets you run it manually from the Actions tab
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate boards
        run: python kalshi_weather.py
      - name: Commit updated boards + state
        run: |
          git config user.name  "weather-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "update boards [skip ci]"
          git push
