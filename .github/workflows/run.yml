name: nimbus
on:
  schedule:
    # Minutes are deliberately off the hour: GitHub delays :00 crons the most
    # (observed 2026-07: 12:00 fired at 13:26, 02:00 fired at 05:51).
    # Local times shift one hour later in winter (CST).
    - cron: '17 12 * * *'   # ~7:17 AM Dallas (CDT): morning board, same-day highs (06z GFS + 00z ECMWF/ICON/GEM cycle)
    - cron: '38 21 * * *'   # ~4:38 PM Dallas (CDT): capture run; the FULL 12z cycle is in by ~20:12 UTC (measured: ECMWF ENS is the slowest at init+8.2h) and Kalshi listed tomorrow's markets at 14:00 UTC, so tomorrow's lows and highs enter the tracker here on the freshest data
    - cron: '7 2 * * *'     # ~9:07 PM Dallas (CDT): evening board for tomorrow (18z GFS in) + settle results
    - cron: '10 16 * * *'   # ~11:10 AM Dallas (CDT): nowcast SHADOW run only (FUTURE 5 stage 1). Collects paired truncated-vs-untruncated ladder snapshots from station obs; freezes NO plays, refreshes NO boards, so trading behavior and the final-snapshot benchmark are untouched.
  workflow_dispatch: {}     # lets you run it manually from the Actions tab
permissions:
  contents: write
concurrency:
  group: nimbus
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Self-test
        run: python test_nimbus.py
      - name: Generate boards
        env:
          # Phone pings (audit batch 10): create these two repo secrets to turn
          # notifications on; leave them absent and the notifier is a silent no-op.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NIMBUS_PAGE_URL: https://nfliegelman.github.io/nimbus/
          # The 16:10 UTC cron runs in shadow-only mode; every other trigger
          # (other crons, manual dispatch) runs the normal full pipeline.
          NIMBUS_SHADOW_RUN: ${{ github.event.schedule == '10 16 * * *' && '1' || '' }}
        run: python kalshi_weather.py
      - name: Commit updated boards + state
        run: |
          git config user.name  "weather-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "update boards [skip ci]"
          git pull --rebase --autostash origin main
          git push
